theme = "base16_transparent"
[editor]
line-number = "relative"
true-color = true
cursorline = false
color-modes = true
auto-completion = true
auto-save = true
bufferline = "always"

[editor.file-picker]
max-depth = 6
hidden = false

[editor.whitespace.render]
space = "all"
tab = "all"
newline = "all"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.whitespace.characters]
space = "."
nbsp = "⍽"
tab = "→"
newline = "↲"

[editor.indent-guides]
render = true
character = "|"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-inlay-hints = true

[editor.soft-wrap]
enable = false

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
H = "goto_previous_buffer"
L = "goto_next_buffer"
J = "join_selections"

[keys.normal." "]
w = ":write"
f = "file_picker_in_current_directory"

[keys.insert]
C-m = "completion" # Ctrl + spaceで補完
C-c = "normal_mode"

