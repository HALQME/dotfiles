[git_branch]
symbol = "´Éİ "
style = "bold mauve"
format = "[$symbol$branch]($style) "

[git_status]
conflicted = '[´Éí $count ](green)'
ahead = '[¯î╝ $count ](green)'
behind = '[¯î║ $count ](yellow)'
diverged = '[¯éá$count ](yellow)'
up_to_date = 'Ô£ô'
untracked = '[¾▒ÇÂ $count ](orange)'
stashed = '[¾▒Äñ$count ](green)'
modified = '[´æÖ $count ](blue)'
staged = '[´æù $count ](green)'
renamed = '[´æÜ $count ](orange)'
deleted = '[´æİ $count](red)'
format='[$conflict$ahead$behind$diverged$up_to_date$untracked$stashed$modified$staged$renamed$deleted]($format)'

[directory]
truncation_length = 0
truncation_symbol = "../"
style = "bold lavender"
read_only = " ¾░î¥"

[os]
disabled = false
style = "green"
format = "[$symbol]($style)"

[time]
disabled = false
format = '[\[$time\]](subtext0)'
time_format = '%T'
utc_time_offset = '+9'

