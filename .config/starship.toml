"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$directory\
$git_branch\
$fill $git_status
$character
"""

right_format = """
$time
"""

command_timeout = 100

continuation_prompt = " ÔØ»ÔØ» "

palette = "catppuccin_macchiato"

